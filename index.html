<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautiful two-player Dots and Boxes strategy game. Connect the dots, complete boxes, and outscore your opponent!">
  <title>Dot Connect — The Classic Strategy Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="game-wrapper">
    <!-- Header -->
    <header id="game-header">
      <h1>
        <span class="logo-dot"></span>
        Dot Connect
        <span class="logo-dot"></span>
      </h1>
      <p class="subtitle">Complete boxes to score — most boxes wins!</p>
    </header>

    <!-- Scoreboard -->
    <div id="scoreboard">
      <div class="player-card" id="player1-card">
        <div class="player-avatar" id="player1-avatar">1</div>
        <div class="player-info">
          <span class="player-name" id="player1-name">Player 1</span>
          <span class="player-score" id="player1-score">0</span>
        </div>
        <div class="turn-indicator" id="player1-turn"></div>
      </div>

      <div class="vs-badge">
        <span>VS</span>
      </div>

      <div class="player-card" id="player2-card">
        <div class="player-avatar" id="player2-avatar">2</div>
        <div class="player-info">
          <span class="player-name" id="player2-name">Player 2</span>
          <span class="player-score" id="player2-score">0</span>
        </div>
        <div class="turn-indicator" id="player2-turn"></div>
      </div>
    </div>

    <!-- Game Status -->
    <div id="game-status">
      <span id="status-text">Player 1's Turn</span>
    </div>

    <!-- Game Canvas -->
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
    </div>

    <!-- Controls -->
    <div id="controls">
      <div class="grid-size-selector">
        <label for="grid-size">Grid Size</label>
        <div class="size-buttons">
          <button class="size-btn" data-size="3" id="size-3">3×3</button>
          <button class="size-btn active" data-size="4" id="size-4">4×4</button>
          <button class="size-btn" data-size="5" id="size-5">5×5</button>
          <button class="size-btn" data-size="6" id="size-6">6×6</button>
        </div>
      </div>
      <button id="reset-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        New Game
      </button>
    </div>
  </div>

  <!-- Victory Modal -->
  <div id="victory-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="confetti-container" id="confetti-container"></div>
      <div class="trophy">🏆</div>
      <h2 id="winner-text">Player 1 Wins!</h2>
      <p id="final-score">Score: 5 - 3</p>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
